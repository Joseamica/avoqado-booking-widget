<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservaciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; }
  </style>
</head>
<body>
  <script>
    // Read URL params: ?venue=mindform&locale=es&theme=light&accent-color=%236366f1
    var params = new URLSearchParams(window.location.search)
    var el = document.createElement('avoqado-booking')
    var attrs = ['venue', 'locale', 'theme', 'accent-color', 'mode', 'service-id', 'button-text']
    attrs.forEach(function(attr) {
      var val = params.get(attr)
      if (val) el.setAttribute(attr, val)
    })
    document.body.appendChild(el)
  </script>
  <script src="https://cdn.avoqado.io/widget.js"></script>
</body>
</html>
