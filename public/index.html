<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reservar | Avoqado</title>
  <meta name="theme-color" content="#0f0f10">
  <meta name="color-scheme" content="light dark">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;
      --bg-elev: #ffffff;
      --fg: #0f0f10;
      --fg-muted: #6b7280;
      --border: rgba(15, 15, 16, 0.08);
      --accent: #6366F1;
      --accent-fg: #ffffff;
      --shadow: 0 1px 2px rgba(15,15,16,.04), 0 8px 32px rgba(15,15,16,.06);
      --max: 560px;
    }
    /* Wider shell when the customer is on /classes — the calendar week-grid
       needs ~7 × 130px columns + padding to breathe. */
    body.flow-classes .shell { max-width: 1100px; }
    /* /appointments runs the wizard with a sticky Resumen sidebar on desktop;
       it needs more horizontal real estate than the rest of the hosted site. */
    body.flow-appointments .shell { max-width: 1180px; }
    /* Light theme forced everywhere (landing, classes, appointments).
     * Dark mode is intentionally NOT honored — the booking surface depends on
     * a clean light background for the sidebar Resumen + day-grid contrast,
     * and inconsistent theming across surfaces hurt customer trust during
     * design QA. If a venue ever needs a true dark embed we'll thread it
     * through the `theme` attribute explicitly instead of the OS preference. */
    html { color-scheme: light !important; }
    body, body.flow-appointments, body.flow-classes {
      color-scheme: light !important;
      --bg: #ffffff;
      --bg-elev: #ffffff;
      --fg: #0f0f10;
      --fg-muted: #6b7280;
      --border: rgba(15, 15, 16, 0.08);
      --shadow: 0 1px 2px rgba(15,15,16,.04), 0 8px 32px rgba(15,15,16,.06);
      background: #ffffff;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* TOP NAV — only visible when widget is hosted on book.avoqado.io */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      padding: 12px clamp(16px, 4vw, 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topnav-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--fg);
      text-decoration: none;
    }
    .topnav-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #4F46E5);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }
    /* On /appointments we drop the avocado-purple chip and show only the venue
       name (Square pattern). Cleaner, lets the venue brand carry the screen. */
    body.flow-appointments .topnav-logo { display: none; }
    body.flow-appointments .topnav-brand { font-size: 17px; letter-spacing: -0.4px; }

    .topnav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 13px;
    }
    .topnav-links a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
    }
    .topnav-links a:hover { color: var(--fg); border-bottom-color: var(--border); }
    .topnav-links a.is-active {
      color: var(--accent);
      font-weight: 600;
      border-bottom-color: var(--accent);
    }
    .topnav-cta {
      padding: 8px 14px;
      background: var(--accent);
      color: var(--accent-fg);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .topnav-cta:hover { filter: brightness(1.08); }
    .topnav-hamburger {
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      color: var(--fg);
    }
    .topnav-hamburger svg { width: 18px; height: 18px; }
    @media (max-width: 768px) {
      .topnav-links, .topnav > .topnav-cta { display: none; }
      .topnav-hamburger { display: inline-flex; }
    }
    /* Square pattern: appointments wizard hides desktop nav links + Mi Cuenta
       and exposes the hamburger across all viewports. The drawer carries
       account, navigation, and venue info (see .drawer-appointments below). */
    body.flow-appointments .topnav-links,
    body.flow-appointments .topnav > .topnav-cta { display: none !important; }
    body.flow-appointments .topnav-hamburger { display: inline-flex !important; }

    /* "Comprar créditos" header CTA — visible only when the appointments
       wizard is active AND the venue has at least one credit pack on offer.
       The widget unhides this via the avoqado:credit-packs-loaded event so
       venues without packs never see a dead button. */
    .topnav-cta-credits {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--fg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .topnav-cta-credits svg { width: 14px; height: 14px; flex-shrink: 0; }
    .topnav-cta-credits:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    body.flow-appointments .topnav-cta-credits.is-available { display: inline-flex; }
    /* Tighten the chrome on phones — keep only the icon when space is tight. */
    @media (max-width: 480px) {
      body.flow-appointments .topnav-cta-credits .topnav-cta-credits-label { display: none; }
      .topnav-cta-credits { padding: 8px 10px; }
    }

    /* MOBILE DRAWER */
    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(15,15,16,0.45);
      z-index: 200;
      display: none;
      animation: fade-in .15s ease both;
    }
    .drawer.open { display: block; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .drawer-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: min(85vw, 360px);
      height: 100%;
      background: var(--bg-elev);
      padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: -4px 0 24px rgba(0,0,0,0.16);
      transform: translateX(0);
      animation: slide-in .2s ease both;
      overflow-y: auto;
    }
    @keyframes slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-close {
      align-self: flex-end;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--fg);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .drawer-close svg { width: 16px; height: 16px; }
    .drawer-link {
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      border-left: 0;
      border-right: 0;
      border-top: 0;
      text-align: left;
    }
    .drawer-link.is-active { color: var(--accent); font-weight: 700; }
    .drawer-link.is-cta {
      background: var(--accent);
      color: var(--accent-fg);
      border-radius: 10px;
      text-align: center;
      margin-top: 14px;
      border: 0;
      font-weight: 600;
    }

    /* DRAWER MODES — default for landing/classes/packs, appointments-specific
       for the wizard. The body class flips which group is visible. */
    .drawer-default { display: flex; flex-direction: column; gap: 4px; }
    .drawer-appointments { display: none; flex-direction: column; gap: 0; flex: 1; }
    body.flow-appointments .drawer-default { display: none; }
    body.flow-appointments .drawer-appointments { display: flex; }

    .drawer-venue-name {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--fg);
      margin: 4px 0 18px;
    }
    .drawer-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 16px 0;
      border-bottom: 1px solid var(--border);
      width: 100%; text-align: left;
      background: transparent; border-left: 0; border-right: 0; border-top: 0;
      font-family: inherit; cursor: default;
    }
    .drawer-row.is-button { cursor: pointer; }
    .drawer-row.is-button:hover .drawer-row-icon { background: #e5e7eb; }
    .drawer-row-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
    .drawer-row-label { font-size: 14px; font-weight: 600; color: var(--fg); }
    .drawer-row-value { font-size: 13px; color: var(--fg-muted); line-height: 1.4; }
    .drawer-row-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: #f3f4f6; color: var(--fg);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease;
      border: 0; padding: 0;
    }
    .drawer-row-icon svg { width: 16px; height: 16px; }
    .drawer-signin-cta {
      margin-top: auto;
      padding: 16px;
      background: var(--accent);
      color: var(--accent-fg);
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
    }
    .drawer-signin-cta:hover { filter: brightness(0.92); }

    /* CONTENT */
    .page {
      padding: clamp(16px, 4vw, 32px) clamp(12px, 3vw, 24px);
    }
    /* Free-flowing layout — no card/box around content. Inner sections
       (sidebar, session blocks, etc.) own their own surfaces. Mirrors
       Square / Mindbody where the page bg = section bg, no nested chrome. */
    .shell {
      max-width: var(--max);
      margin: 0 auto;
    }
    .footer {
      padding: 32px 24px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .footer a { color: inherit; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; }
    .footer a:hover { color: var(--fg); }
    .footer-logo {
      height: 18px;
      width: auto;
      display: inline-block;
      vertical-align: middle;
      margin-left: 2px;
      opacity: 0.85;
      transition: opacity 0.15s ease;
    }
    .footer a:hover .footer-logo { opacity: 1; }
    /* Compact, low-key footer everywhere — same tone whether the customer is
     * on the landing, classes listing, or in the middle of the appointments
     * wizard. Matches the "Con la tecnología de Avoqado" presentation Square
     * uses on its checkout chrome. */
    .footer { font-size: 11px; padding: 24px 16px 24px; gap: 6px; align-items: center; }

    avoqado-booking { display: block; width: 100%; }
    .loading, .empty {
      padding: 80px 24px;
      text-align: center;
      color: var(--fg-muted);
      font-size: 14px;
    }
    .empty .empty-title { color: var(--fg); font-size: 16px; font-weight: 600; margin: 0 0 8px; }
    .empty a { color: var(--fg); text-decoration: none; font-weight: 500; }
    .loading::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--fg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .loading::before { animation: none; }
      .drawer { animation: none; }
      .drawer-panel { animation: none; }
      .textus-modal { animation: none; }
    }
    /* Skip-to-content */
    .skip-link {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--fg);
      color: var(--bg-elev);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transform: translateY(-200%);
      transition: transform 0.15s ease;
      z-index: 999;
    }
    .skip-link:focus {
      transform: translateY(0);
      outline: 2px solid var(--fg-muted);
      outline-offset: 2px;
    }

    /* TEXT US — floating button + modal. Only visible on /appointments.
       The form is intentionally a UI stub — submission is wired to a TODO
       handler for future SMS/contact integration. See script below. */
    .textus-fab {
      position: fixed;
      right: clamp(16px, 3vw, 24px);
      bottom: clamp(16px, 3vw, 24px);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: 0 6px 20px rgba(15,15,16,0.12);
      color: var(--fg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      z-index: 60;
      font-family: inherit;
    }
    .textus-fab:hover { box-shadow: 0 10px 28px rgba(15,15,16,0.18); transform: translateY(-1px); }
    .textus-fab svg { width: 18px; height: 18px; flex-shrink: 0; }

    .textus-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,15,16,0.45);
      z-index: 250;
      display: none;
      align-items: flex-end;
      justify-content: center;
      animation: fade-in .15s ease both;
    }
    .textus-modal-overlay.open { display: flex; }
    @media (min-width: 640px) {
      .textus-modal-overlay { align-items: center; }
    }
    .textus-modal {
      width: min(100%, 420px);
      background: var(--bg-elev);
      border-radius: 18px 18px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 32px rgba(15,15,16,0.16);
      display: flex; flex-direction: column; gap: 14px;
      animation: slide-up .25s ease both;
      max-height: 92vh;
      overflow-y: auto;
    }
    @media (min-width: 640px) {
      .textus-modal { border-radius: 18px; animation: none; max-height: 88vh; }
    }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .textus-close {
      align-self: flex-start;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .textus-close svg { width: 14px; height: 14px; }
    .textus-icon-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #f3f4f6;
      display: inline-flex; align-items: center; justify-content: center;
      margin: 0 auto;
    }
    .textus-icon-wrap svg { width: 24px; height: 24px; color: var(--fg); }
    .textus-title {
      font-size: 18px; font-weight: 700;
      margin: 0; text-align: center;
      color: var(--fg);
    }
    .textus-subtitle {
      font-size: 13px; color: var(--fg-muted);
      margin: 0; text-align: center;
    }
    .textus-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-elev);
      color: var(--fg);
      outline: none;
    }
    .textus-input:focus {
      border-color: var(--fg);
      box-shadow: 0 0 0 3px rgba(15,15,16,0.06);
    }
    textarea.textus-input { min-height: 90px; resize: vertical; }
    .textus-legal {
      font-size: 11px; color: var(--fg-muted);
      line-height: 1.5; text-align: center;
      margin: 2px 0 0;
    }
    .textus-submit {
      padding: 14px;
      background: #d1d5db;
      color: #6b7280;
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: not-allowed;
      font-family: inherit;
      transition: background 0.15s ease;
    }
    .textus-submit.is-active {
      background: var(--accent);
      color: var(--accent-fg);
      cursor: pointer;
    }
    .textus-submit.is-active:hover { filter: brightness(0.92); }
  </style>
</head>
<body>
  <a class="skip-link" href="#mount">Saltar al contenido</a>

  <!-- Top nav. Built dynamically by the script below so the venue name
       (parsed from the URL) and the active link both reflect current state. -->
  <header class="topnav" id="topnav" hidden>
    <a class="topnav-brand" id="nav-brand" href="/">
      <span class="topnav-logo" id="nav-logo">·</span>
      <span id="nav-venue-name">Reservas</span>
    </a>
    <nav class="topnav-links" id="nav-links" aria-label="Secciones del sitio">
      <a href="" data-route="appointments">Citas</a>
      <a href="" data-route="classes" data-requires="classes" hidden>Clases</a>
      <a href="" data-route="packs" data-requires="packs" hidden>Comprar paquetes</a>
    </nav>
    <button class="topnav-cta" id="nav-account" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Mi Cuenta
    </button>
    <button class="topnav-cta-credits" id="nav-credits" type="button" aria-label="Comprar créditos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="14" rx="2"/>
        <line x1="2" y1="11" x2="22" y2="11"/>
      </svg>
      <span class="topnav-cta-credits-label">Comprar créditos</span>
    </button>
    <button class="topnav-hamburger" id="nav-hamburger" type="button" aria-label="Abrir menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </header>

  <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Menú">
    <div class="drawer-panel">
      <button class="drawer-close" id="drawer-close" type="button" aria-label="Cerrar menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <!-- Default drawer (landing, classes, packs) — site navigation. -->
      <div class="drawer-default">
        <a class="drawer-link" href="" data-route="appointments">Citas</a>
        <a class="drawer-link" href="" data-route="classes" data-requires="classes" hidden>Clases</a>
        <a class="drawer-link" href="" data-route="packs" data-requires="packs" hidden>Comprar paquetes</a>
        <button class="drawer-link is-cta" id="drawer-account" type="button">Mi Cuenta</button>
      </div>

      <!-- Appointments drawer — Square-style venue info + Iniciar sesión.
           Populated by JS from the avoqado:venue-loaded event the widget fires
           after fetching venue data. Static defaults render before the event
           arrives so the drawer never appears empty. -->
      <div class="drawer-appointments">
        <h2 class="drawer-venue-name" id="drawer-venue-name">Venue</h2>

        <div class="drawer-row">
          <div class="drawer-row-content">
            <span class="drawer-row-label">Punto de venta</span>
            <span class="drawer-row-value" id="drawer-pos">Nos pondremos en contacto contigo.</span>
          </div>
        </div>

        <a class="drawer-row is-button" id="drawer-phone-row" href="tel:" hidden>
          <div class="drawer-row-content">
            <span class="drawer-row-label">Teléfono</span>
            <span class="drawer-row-value" id="drawer-phone">—</span>
          </div>
          <span class="drawer-row-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
        </a>

        <div class="drawer-row" id="drawer-hours-row" hidden>
          <div class="drawer-row-content">
            <span class="drawer-row-label">Horario</span>
            <span class="drawer-row-value" id="drawer-hours">—</span>
          </div>
        </div>

        <button class="drawer-row is-button" id="drawer-textus-row" type="button">
          <div class="drawer-row-content">
            <span class="drawer-row-label">Envíanos un SMS</span>
            <span class="drawer-row-value">Te responderemos lo antes posible</span>
          </div>
          <span class="drawer-row-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
        </button>

        <button class="drawer-signin-cta" id="drawer-signin-appointments" type="button">Iniciar sesión</button>
      </div>
    </div>
  </div>

  <!-- "Text us" floating button — visible across landing, appointments, and
       classes. Click dispatches `avoqado:open-chat` on window; the widget
       (VenueChatModal, inside the shadow DOM) listens for it and opens the
       real backend-wired chat. The widget's own shadow-DOM FAB is suppressed
       via the `hide-chat-fab` attribute so we never render two buttons. -->
  <button class="textus-fab" id="textus-fab" type="button" aria-label="Envíanos un mensaje">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Envíanos un mensaje</span>
  </button>

<div class="page">
    <div class="shell">
      <main id="mount" tabindex="-1">
        <div class="loading">Cargando…</div>
      </main>
      <div class="footer" id="footer">
        <span>Con la tecnología de</span>
        <a href="https://avoqado.io" target="_blank" rel="noopener" aria-label="Avoqado">
          <img src="/avoqado-wordmark.svg" alt="Avoqado" class="footer-logo">
        </a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // Parse path: /<venueSlug>[/appointments|/classes]
      var rawPath = window.location.pathname.replace(/^\/+|\/+$/g, '')
      var parts = rawPath.split('/').filter(Boolean)
      var slug = parts[0] || ''
      var flowType = parts[1] || ''

      // Tag the body with the flow so CSS can react (e.g. wider shell on /classes).
      if (flowType === 'classes') document.body.classList.add('flow-classes')
      else if (flowType === 'appointments') document.body.classList.add('flow-appointments')

      if (!slug) {
        var mountEmpty = document.getElementById('mount')
        mountEmpty.innerHTML =
          '<div class="empty">' +
            '<p class="empty-title">Venue no especificado</p>' +
            '<p>Pide al negocio el enlace correcto, o vuelve a <a href="https://avoqado.io">avoqado.io</a></p>' +
          '</div>'
        return
      }

      // ----- TOP NAV setup --------------------------------------------------
      // We only render the top nav for the hosted page (book.avoqado.io). The
      // widget can also be embedded as a Web Component on third-party sites;
      // those embeds shouldn't get an Avoqado-branded chrome above them.
      var nav = document.getElementById('topnav')
      var navVenue = document.getElementById('nav-venue-name')
      var navLogo = document.getElementById('nav-logo')
      var navBrand = document.getElementById('nav-brand')
      var displayName = slug.charAt(0).toUpperCase() + slug.slice(1).replace(/[-_]/g, ' ')
      navVenue.textContent = displayName
      navLogo.textContent = displayName.charAt(0).toUpperCase()
      navBrand.href = '/' + slug
      // Pre-populate the appointments drawer venue name with the slug-derived
      // display name. The avoqado:venue-loaded handler upgrades it to the real
      // name once the API responds.
      var drawerVenueName = document.getElementById('drawer-venue-name')
      if (drawerVenueName) drawerVenueName.textContent = displayName

      function buildHref(route) {
        if (route === 'appointments') return '/' + slug + '/appointments'
        if (route === 'classes') return '/' + slug + '/classes'
        if (route === 'packs') return '/' + slug + '#packs'
        return '/' + slug
      }
      function activeRoute() {
        if (flowType === 'appointments') return 'appointments'
        if (flowType === 'classes') return 'classes'
        if (window.location.hash === '#packs') return 'packs'
        return null // landing
      }
      var activeNow = activeRoute()
      function applyActive(scope) {
        scope.querySelectorAll('a[data-route]').forEach(function (a) {
          var route = a.getAttribute('data-route')
          a.href = buildHref(route)
          a.classList.toggle('is-active', route === activeNow)
        })
      }
      applyActive(nav)
      applyActive(document.getElementById('drawer'))
      nav.hidden = false

      // Drawer behavior (mobile + appointments-mode-everywhere)
      var drawer = document.getElementById('drawer')
      function openDrawer() { drawer.classList.add('open') }
      function closeDrawer() { drawer.classList.remove('open') }
      document.getElementById('nav-hamburger').addEventListener('click', openDrawer)
      document.getElementById('drawer-close').addEventListener('click', closeDrawer)
      drawer.addEventListener('click', function (e) {
        if (e.target === drawer) closeDrawer()
      })
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          if (drawer.classList.contains('open')) closeDrawer()
        }
      })

      // "Envíanos un mensaje" FAB + drawer row → opens the widget's real
       // venue-chat modal (lives inside the shadow DOM) by dispatching a
       // window event that VenueChatModal listens for.
      function openVenueChat() {
        window.dispatchEvent(new CustomEvent('avoqado:open-chat'))
        if (drawer.classList.contains('open')) closeDrawer()
      }
      var textusFab = document.getElementById('textus-fab')
      if (textusFab) textusFab.addEventListener('click', openVenueChat)
      var drawerTextus = document.getElementById('drawer-textus-row')
      if (drawerTextus) drawerTextus.addEventListener('click', openVenueChat)

      // ----- Body flow class sync on client-side navigation ----------------
      // The widget pushes URL state when the customer enters appointments/
      // classes from the unified landing (BookingFlow → pushState). Without
      // this watcher the host page chrome (topnav active link, drawer mode,
      // shell max-width) stays locked to whatever the URL was at first paint
      // — which is why /appointments looked narrow until a manual refresh.
      function syncFlowFromUrl() {
        var parts = window.location.pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean)
        var nextFlow = parts[1] || ''
        document.body.classList.toggle('flow-appointments', nextFlow === 'appointments')
        document.body.classList.toggle('flow-classes', nextFlow === 'classes')
        flowType = nextFlow
        activeNow = activeRoute()
        applyActive(nav)
        applyActive(drawer)
      }
      window.addEventListener('popstate', syncFlowFromUrl)
      // pushState/replaceState don't emit events natively — patch them so we
      // can react when the widget changes the URL without a reload.
      ;['pushState', 'replaceState'].forEach(function (method) {
        var original = history[method]
        history[method] = function () {
          var result = original.apply(this, arguments)
          window.dispatchEvent(new Event('avq:locationchange'))
          return result
        }
      })
      window.addEventListener('avq:locationchange', syncFlowFromUrl)

      // ----- Widget mount ---------------------------------------------------
      var el = document.createElement('avoqado-booking')
      el.setAttribute('venue', slug)
      el.setAttribute('mode', 'inline')
      // The hosted page already shows the venue brand in the topnav, so
      // suppress the widget's inline venue header to avoid duplication.
      // External embeds (without our topnav) keep their own header.
      el.setAttribute('hide-venue-header', 'true')
      // Host-page renders its own "Envíanos un mensaje" FAB in the light DOM
      // (see #textus-fab + the click handler that dispatches
      // `avoqado:open-chat`); the widget's internal shadow-DOM FAB would be
      // a visual duplicate, so we suppress it here.
      el.setAttribute('hide-chat-fab', 'true')
      // Square-style /appointments forces light theme regardless of system
      // preference; everything else honors auto. We set this BEFORE attaching
      // the element so the first paint is already light.
      if (flowType === 'appointments') {
        el.setAttribute('theme', 'light')
      }

      if (flowType === 'appointments' || flowType === 'classes') {
        el.setAttribute('flow-type', flowType)
      }

      var params = new URLSearchParams(window.location.search)
      ;['locale', 'accent-color'].forEach(function (attr) {
        var val = params.get(attr)
        if (val) el.setAttribute(attr, val)
      })
      // theme query param overrides the appointments-light default if explicitly
      // set by the embedder (rare but supported).
      var themeOverride = params.get('theme')
      if (themeOverride) el.setAttribute('theme', themeOverride)

      // Deep-link to Manage Booking from the reminder email CTA. The email
      // sends customers to /<slug>?manage=<cancelSecret>; we hand the secret
      // to the widget once it's connected so it lands directly on the booking
      // detail instead of the catalog. Wait one tick for connectedCallback().
      var manageSecret = params.get('manage')
      if (manageSecret) {
        setTimeout(function () {
          if (typeof el.showManageBooking === 'function') {
            el.showManageBooking(manageSecret)
          } else {
            // Older widget bundle that doesn't have the public method yet.
            el.dispatchEvent(new CustomEvent('_avq_show_manage', {
              bubbles: false,
              detail: { cancelSecret: manageSecret },
            }))
          }
        }, 0)
      }

      // Wire "Mi Cuenta" / "Iniciar sesión" buttons → widget.showAccount()
      function callShowAccount() {
        if (typeof el.showAccount === 'function') {
          el.showAccount()
        } else {
          // Older widget bundles without showAccount(): fallback to event dispatch
          el.dispatchEvent(new CustomEvent('_avq_show_account', { bubbles: false }))
        }
        closeDrawer()
      }
      document.getElementById('nav-account').addEventListener('click', callShowAccount)
      document.getElementById('drawer-account').addEventListener('click', callShowAccount)
      var drawerSigninAppts = document.getElementById('drawer-signin-appointments')
      if (drawerSigninAppts) drawerSigninAppts.addEventListener('click', callShowAccount)

      // Auth-aware label for the drawer CTA. When the widget has a stored
      // customer session, the button reads "Mi cuenta · {firstName}" instead
      // of "Iniciar sesión". State source-of-truth is the widget's
      // localStorage (avq_customer_token / avq_customer_info); live updates
      // arrive via the avoqado:auth-changed event the widget fires on mount
      // and whenever the customer logs in or out in this tab. Cross-tab
      // changes propagate via the native `storage` event.
      function readStoredCustomer() {
        try {
          var token = localStorage.getItem('avq_customer_token')
          if (!token) return null
          var raw = localStorage.getItem('avq_customer_info')
          return raw ? JSON.parse(raw) : {}
        } catch (_) { return null }
      }
      function applyAuthLabel(customer) {
        if (!drawerSigninAppts) return
        if (customer) {
          var name = customer.firstName && String(customer.firstName).trim()
          drawerSigninAppts.textContent = name ? 'Mi cuenta · ' + name : 'Mi cuenta'
        } else {
          drawerSigninAppts.textContent = 'Iniciar sesión'
        }
      }
      applyAuthLabel(readStoredCustomer())
      el.addEventListener('avoqado:auth-changed', function (e) {
        applyAuthLabel(e && e.detail ? e.detail.customer : null)
      })
      window.addEventListener('storage', function (e) {
        if (e.key === 'avq_customer_token' || e.key === 'avq_customer_info') {
          applyAuthLabel(readStoredCustomer())
        }
      })

      // "Comprar créditos" button — only visible on /appointments AND after the
      // widget reports the venue actually has packs available. The widget's
      // showCreditPacks() opens a modal listing every pack with its own buy
      // CTA; clicking one continues through the existing CheckoutModal flow.
      var navCredits = document.getElementById('nav-credits')
      el.addEventListener('avoqado:credit-packs-loaded', function (e) {
        var count = (e && e.detail && typeof e.detail.count === 'number') ? e.detail.count : 0
        // "Comprar créditos" CTA inside /appointments wizard
        if (navCredits) navCredits.classList.toggle('is-available', count > 0)
        // Top-nav "Comprar paquetes" links (header + drawer) — only render
        // when the venue actually has packs configured. data-requires="packs"
        // marker keeps the wiring declarative.
        document.querySelectorAll('[data-requires="packs"]').forEach(function (el) {
          if (count > 0) el.removeAttribute('hidden')
          else el.setAttribute('hidden', '')
        })
      })
      if (navCredits) {
        navCredits.addEventListener('click', function () {
          if (typeof el.showCreditPacks === 'function') {
            el.showCreditPacks()
          } else {
            el.dispatchEvent(new CustomEvent('_avq_show_credit_packs', { bubbles: false }))
          }
        })
      }

      // ----- Drawer venue-info hydration (appointments mode only) -----------
      // The widget fetches venue info, then dispatches avoqado:venue-loaded on
      // its host element with { name, address, phone, hours }. We read it here
      // and populate the drawer rows. If the event never fires (offline, error),
      // the drawer still renders with the slug-derived name + static defaults.
      el.addEventListener('avoqado:venue-loaded', function (e) {
        var info = e && e.detail && e.detail.venue
        if (!info) return
        if (drawerVenueName && info.name) drawerVenueName.textContent = info.name
        if (navVenue && info.name) navVenue.textContent = info.name

        // Hide "Clases" nav link (header + drawer) when the venue has no
        // class-type products. Capability flag comes from the widget when it
        // resolves venueInfo. Defensive default: keep hidden if missing.
        var hasClasses = info.hasClasses === true
        document.querySelectorAll('[data-requires="classes"]').forEach(function (el) {
          if (hasClasses) el.removeAttribute('hidden')
          else el.setAttribute('hidden', '')
        })

        // Apply the venue brand color to the host page chrome (topnav "Mi
        // Cuenta" CTA, active tab underline, drawer links) AND propagate it
        // to the widget element so the booking flow (CTAs, badges, links)
        // also picks up the venue's color. Only honor it when the URL didn't
        // already pin an accent-color override and the venue value looks
        // like a CSS color — defensive against bad data.
        var urlAccent = params.get('accent-color')
        var brand = info.primaryColor
        if (!urlAccent && typeof brand === 'string' && /^(#|rgb|hsl|oklch|color\()/i.test(brand.trim())) {
          var trimmed = brand.trim()
          document.documentElement.style.setProperty('--accent', trimmed)
          // Widget reads `accent-color` HTML attribute → maps to --avq-accent
          // CSS token (see App.tsx). Without this line /clases and
          // /appointments ignored the venue admin's primaryColor and used the
          // hardcoded default blue.
          if (el && typeof el.setAttribute === 'function') {
            el.setAttribute('accent-color', trimmed)
          }
        }

        // Wide marketing logo. When the venue has `logoFull` we replace the
        // single-letter avatar + plain name with an <img>. The name stays in
        // the DOM (sr-only via aria-label) so the topnav still reads as the
        // venue name to assistive tech. Falls through to the existing
        // initials avatar when missing.
        if (info.logoFull && typeof info.logoFull === 'string' && navLogo) {
          var img = document.createElement('img')
          img.src = info.logoFull
          img.alt = info.name || ''
          img.style.maxHeight = '28px'
          img.style.maxWidth = '180px'
          img.style.objectFit = 'contain'
          img.style.display = 'block'
          navLogo.innerHTML = ''
          navLogo.appendChild(img)
          navLogo.style.background = 'transparent'
          navLogo.style.border = '0'
          navLogo.style.width = 'auto'
          navLogo.style.height = 'auto'
          // Hide the redundant name text once the wordmark is shown.
          if (navVenue) navVenue.style.display = 'none'
        } else if (info.logo && typeof info.logo === 'string' && navLogo) {
          // Fall back to the small square logo if no wide variant exists.
          var img2 = document.createElement('img')
          img2.src = info.logo
          img2.alt = ''
          img2.style.width = '100%'
          img2.style.height = '100%'
          img2.style.objectFit = 'cover'
          img2.style.borderRadius = '8px'
          navLogo.innerHTML = ''
          navLogo.appendChild(img2)
        }

        var phoneRow = document.getElementById('drawer-phone-row')
        var phoneVal = document.getElementById('drawer-phone')
        if (info.phone && phoneRow && phoneVal) {
          phoneVal.textContent = info.phone
          phoneRow.href = 'tel:' + info.phone.replace(/[^+0-9]/g, '')
          phoneRow.hidden = false
        }

        var hoursRow = document.getElementById('drawer-hours-row')
        var hoursVal = document.getElementById('drawer-hours')
        if (info.hoursLabel && hoursRow && hoursVal) {
          hoursVal.textContent = info.hoursLabel
          hoursRow.hidden = false
        }
      })

      // Mount widget into the shell
      var mountEl = document.getElementById('mount')
      var swapped = false
      var swap = function () {
        if (swapped) return
        swapped = true
        mountEl.innerHTML = ''
        mountEl.appendChild(el)
      }
      el.addEventListener('avoqado:ready', swap, { once: true })
      mountEl.appendChild(el)
      setTimeout(function () {
        var loading = mountEl.querySelector('.loading')
        if (loading && loading.parentNode === mountEl) loading.remove()
      }, 600)

      // Footer copy now lives in the static HTML — same "Con la tecnología
      // de Avoqado" on every surface (landing, classes, appointments). The
      // per-flow swap that used to live here is no longer needed.
    })()
  </script>
  <!-- Same-origin widget bundle. Built by `npm run build` to dist/widget.js. -->
  <script src="/widget.js" defer></script>
</body>
</html>
