<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reservar</title>
  <meta name="theme-color" content="#0f0f10">
  <meta name="color-scheme" content="light dark">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;
      --bg-elev: #ffffff;
      --fg: #0f0f10;
      --fg-muted: #6b7280;
      --border: rgba(15, 15, 16, 0.08);
      --shadow: 0 1px 2px rgba(15,15,16,.04), 0 8px 32px rgba(15,15,16,.06);
      --max: 560px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10;
        --bg-elev: #161618;
        --fg: #f4f4f5;
        --fg-muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 32px rgba(0,0,0,.4);
      }
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }
    /* Standalone (when opened directly, NOT in iframe) — show framed card */
    body.standalone {
      padding: clamp(16px, 4vw, 32px) clamp(12px, 3vw, 24px);
      box-sizing: border-box;
    }
    body.standalone .shell {
      max-width: var(--max);
      margin: 0 auto;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    body.standalone .header {
      padding: 24px 24px 8px;
      border-bottom: 1px solid var(--border);
    }
    body.standalone .venue-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin: 0 0 6px;
    }
    body.standalone h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 18px;
      color: var(--fg);
    }
    body.standalone .footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    body.standalone .footer a {
      color: inherit;
      text-decoration: none;
      font-weight: 500;
    }
    body.standalone .footer a:hover { color: var(--fg); }
    /* Iframe mode — minimal, transparent */
    body.iframed {
      background: transparent;
    }
    body.iframed .header,
    body.iframed .footer { display: none; }
    body.iframed .shell {
      background: transparent;
      border: 0;
      box-shadow: none;
      max-width: none;
    }
    avoqado-booking { display: block; width: 100%; }
    /* Loading state */
    .loading {
      padding: 80px 24px;
      text-align: center;
      color: var(--fg-muted);
      font-size: 14px;
    }
    .loading::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--fg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .loading::before { animation: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <p class="venue-name" id="venueLabel">Reservar</p>
      <h1 id="title">Agenda tu visita</h1>
    </div>
    <div id="mount">
      <div class="loading">Cargando reservaciones</div>
    </div>
    <div class="footer">
      <span>Reservas con</span>
      <a href="https://avoqado.io" target="_blank" rel="noopener">Avoqado</a>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search)
      var inIframe = (function () { try { return window.self !== window.top } catch (e) { return true } })()
      document.body.classList.add(inIframe ? 'iframed' : 'standalone')

      var venueName = params.get('venueName') || params.get('name')
      var titleText = params.get('title')
      if (venueName) document.getElementById('venueLabel').textContent = venueName
      if (titleText) document.getElementById('title').textContent = titleText

      var el = document.createElement('avoqado-booking')
      var attrs = ['venue', 'locale', 'theme', 'accent-color', 'mode', 'service-id', 'button-text']
      attrs.forEach(function (attr) {
        var val = params.get(attr)
        if (val !== null) el.setAttribute(attr, val)
      })
      // Force inline mode in standalone/iframe usage — popup makes no sense here
      if (!el.getAttribute('mode')) el.setAttribute('mode', 'inline')

      var mount = document.getElementById('mount')
      // Replace loading state when widget loads
      el.addEventListener('avoqado:ready', function () { mount.innerHTML = ''; mount.appendChild(el) }, { once: true })
      // Append immediately too — widget may not dispatch ready event in older builds
      mount.appendChild(el)
      var loading = mount.querySelector('.loading')
      if (loading) setTimeout(function () { if (loading.parentNode === mount) loading.remove() }, 600)

      // Auto-resize for parent iframe
      function postHeight() {
        var h = Math.max(
          document.documentElement.scrollHeight,
          document.body.scrollHeight,
          el.offsetHeight || 0
        )
        try { window.parent.postMessage({ type: 'avoqado:resize', height: h }, '*') } catch (_) {}
      }
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(postHeight).observe(document.body)
      } else {
        window.addEventListener('load', postHeight)
        setInterval(postHeight, 1500)
      }

      // Close window when booking confirmed in popup mode (window.opener present)
      el.addEventListener('avoqado:confirmed', function () {
        if (window.opener && !inIframe) {
          // Give the user 5s to see confirmation, then offer close
          setTimeout(function () {
            try { window.close() } catch (_) {}
          }, 5000)
        }
      })
    })()
  </script>
  <script src="https://cdn.avoqado.io/widget.js" defer></script>
</body>
</html>
